# @package _global_

# Full experiment: EVA-X Small + U-Ones on CheXpert
# Run with:
#   python src/train.py experiment=chexpert_evax_uones

defaults:
  - override /data: chexpert
  - override /model: evax_uones
  - override /trainer: default
  - override /logger: wandb
  - _self_

tags: ["chexpert", "evax_small", "u_ones"]

seed: 42

trainer:
  max_epochs: 30
  accelerator: gpu
  devices: 1
  precision: 16-mixed
  gradient_clip_val: 1.0

data:
  batch_size: 32
  uncertainty_policy: u_ones
  image_size: 224

model:
  uncertainty_policy: u_ones

callbacks:
  model_checkpoint:
    monitor: val/auroc_macro
    mode: max
    save_top_k: 3
    filename: "epoch_{epoch:02d}-auroc_{val/auroc_macro:.4f}"
  early_stopping:
    monitor: val/auroc_macro
    mode: max
    patience: 7

logger:
  wandb:
    project: "chexpert-medimg"
    name: "evax-small-u_ones"
    tags: ${tags}
