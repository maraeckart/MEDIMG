# configs/experiment/chexpert_mean_teacher.yaml

# @package _global_

defaults:
  - override /data: chexpert
  - override /model: mean_teacher
  - override /trainer: default
  - override /logger: wandb
  - _self_

tags: ["chexpert", "densenet121", "mean_teacher", "u_ignore"]

seed: 42

trainer:
  max_epochs: 30
  accelerator: gpu
  devices: 1
  precision: 16-mixed
  gradient_clip_val: 1.0

data:
  batch_size: 32
  uncertainty_policy: u_ignore
  image_size: 224
  aug_gaussian_blur: true

model:
  uncertainty_policy: u_ignore
  ema_decay: 0.999
  consistency_weight: 1.0

callbacks:
  model_checkpoint:
    monitor: val/auroc_macro
    mode: max
    save_top_k: 3
    filename: "epoch_{epoch:02d}-auroc_{val/auroc_macro:.4f}"
  early_stopping:
    monitor: val/auroc_macro
    mode: max
    patience: 7

logger:
  wandb:
    project: "chexpert-medimg"
    name: "mean-teacher-u_ignore"
    tags: ${tags}